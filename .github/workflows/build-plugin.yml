name: Build WordPress Plugin

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-plugin:
    name: Build installable plugin ZIP
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate plugin structure
        run: |
          test -f surfside-tools.php
          test -d includes
          php -l surfside-tools.php
          find includes -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Build WordPress-ready ZIP
        run: |
          rm -rf build surfside-tools.zip
          mkdir -p build/surfside-tools
          rsync -a \
            --exclude='.git*' \
            --exclude='.github' \
            --exclude='.cpanel.yml' \
            --exclude='build' \
            --exclude='docs' \
            --exclude='surfside-tools.zip' \
            --exclude='README.md' \
            ./ build/surfside-tools/
          cd build
          zip -r ../surfside-tools.zip surfside-tools

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: surfside-tools-wordpress-plugin
          path: surfside-tools.zip
          if-no-files-found: error
          retention-days: 30
